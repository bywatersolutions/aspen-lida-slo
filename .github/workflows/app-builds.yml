name: App Builds

on:
# changes to deploy/build.json on main branch
  push:
    branches: [main, master]
    paths:
      - "deploy/build.json"
# manual execution
  workflow_dispatch:

env:
  API_KEY_1: ${{ secrets.API_KEY_1 }}
  API_KEY_2: ${{ secrets.API_KEY_2 }}
  API_KEY_3: ${{ secrets.API_KEY_3 }}
  API_KEY_4: ${{ secrets.API_KEY_4 }}
  API_KEY_5: ${{ secrets.API_KEY_5 }}
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
  EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
  EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
  GOOGLE_API_KEY_ANDROID: ${{ secrets.GOOGLE_API_KEY_ANDROID }}
  GOOGLE_API_KEY_APPLE: ${{ secrets.GOOGLE_API_KEY_APPLE }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
#  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  check-skip:
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Skip CI check
        run: echo "Proceeding with workflow"

  validate-secrets:
    runs-on: ubuntu-latest
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
    steps:
      - name: 🔐 Validate required secrets
        id: check
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
          API_KEY_3: ${{ secrets.API_KEY_3 }}
          API_KEY_4: ${{ secrets.API_KEY_4 }}
          API_KEY_5: ${{ secrets.API_KEY_5 }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
          EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          GOOGLE_API_KEY_ANDROID: ${{ secrets.GOOGLE_API_KEY_ANDROID }}
          GOOGLE_API_KEY_APPLE: ${{ secrets.GOOGLE_API_KEY_APPLE }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          missing=0
          check_secret () {
            name=$1
            value=$2

            if [ -z "$value" ]; then
              echo "::warning title=Missing Secret::$name is not set"
              missing=1
            fi
          }
          check_secret "API_KEY_1" "$API_KEY_1"
          check_secret "API_KEY_2" "$API_KEY_2"
          check_secret "API_KEY_3" "$API_KEY_3"
          check_secret "API_KEY_4" "$API_KEY_4"
          check_secret "API_KEY_5" "$API_KEY_5"
          check_secret "EXPO_TOKEN" "$EXPO_TOKEN"
          check_secret "EXPO_APPLE_ID" "$EXPO_APPLE_ID"
          check_secret "EXPO_APPLE_PASSWORD" "$EXPO_APPLE_PASSWORD"
          check_secret "EXPO_TEAM_ID" "$EXPO_TEAM_ID"
          check_secret "SENTRY_AUTH_TOKEN" "$SENTRY_AUTH_TOKEN"
          check_secret "GOOGLE_PLAY_SERVICE_ACCOUNT" "$GOOGLE_PLAY_SERVICE_ACCOUNT"
          check_secret "GOOGLE_API_KEY_ANDROID" "$GOOGLE_API_KEY_ANDROID"
          check_secret "GOOGLE_API_KEY_APPLE" "$GOOGLE_API_KEY_APPLE"
          check_secret "SLACK_WEBHOOK" "$SLACK_WEBHOOK"

          if [ "$missing" -eq 1 ]; then
            echo "secrets_ok=false" >> $GITHUB_OUTPUT
            echo "One or more required secrets are missing. Failing workflow."
            exit 1
          else
            echo "secrets_ok=true" >> $GITHUB_OUTPUT
            echo "All required secrets are present."
          fi

  build-and-deploy:
    needs:
      - check-skip
      - validate-secrets
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        platform: [android]
        include:
          - platform: ios
            runs-on: macos-latest
    runs-on: ${{ matrix.platform == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: 🏗  Checkout repository
        uses: actions/checkout@v4

      - name: 📁 Copy over local deployment files
        run: |
          mkdir -p ./code
          cp ./deploy/app.config.js ./code/app.config.js
          cp ./deploy/eas.json ./code/eas.json
          cp ./deploy/build.json ./code/build.json
          echo "deployment configs copied to code dir"

      - name: 🏗  Setup Node.js
        uses: actions/setup-node@v4
        working-directory: ./code
        with:
          node-version: "22"
          cache: "yarn"

      - name: 📦 Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
        working-directory: ./code

      - name: 📦 Setup yarn cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
        working-directory: ./code

      - name: 📦 Install dependencies
        run: |
          yarn install
          yarn global add eas-cli@latest
        working-directory: ./code

      - name: 📱 Setup EAS build cache
        uses: actions/cache@v3
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-local-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-local-

      - name: 🔄 Verify EAS CLI installation
        run: |
          echo "EAS CLI version:"
          eas --version

      - name: 📋 Fix package.json main entry
        run: |
          # Check if jq is installed, if not install it
          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get update && sudo apt-get install -y jq
          fi

          # Fix the main entry in package.json
          if [ -f ./package.json ]; then
            # Create a backup
            cp package.json package.json.bak
            # Update the package.json
            jq '.main = "node_modules/expo/AppEntry.js"' package.json > package.json.tmp && mv package.json.tmp package.json
            echo "Updated package.json main entry"
            cat package.json | grep "main"
          else
            echo "package.json not found"
            exit 1
          fi
        working-directory: ./code

      - name: 📋 Update metro.config.js for SVG support
        run: |
          if [ -f ./metro.config.js ]; then
            echo "Creating backup of metro.config.js"
            cp ./metro.config.js ./metro.config.js.backup
            echo "Updating metro.config.js to CommonJS format"
            cat > ./metro.config.js << 'EOFMARKER'
          /* eslint-disable @typescript-eslint/no-var-requires */
          const { getDefaultConfig } = require('expo/metro-config');

          const config = getDefaultConfig(__dirname);

          const { transformer, resolver } = config;

          config.transformer = {
            ...transformer,
            babelTransformerPath: require.resolve('react-native-svg-transformer/expo'),
          };

          config.resolver = {
            ...resolver,
            assetExts: resolver.assetExts.filter(ext => ext !== 'svg'),
            sourceExts: [...resolver.sourceExts, 'svg'],
          };

          module.exports = config;
          EOFMARKER
            echo "metro.config.js updated to CommonJS format"
          else
            echo "metro.config.js not found"
          fi
        working-directory: ./code

      - name: 📱 Build Production AAB
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile production --local --non-interactive --output=./app-prod.aab
        env:
          NODE_ENV: production
        working-directory: ./code

      - name: 📱 Build iOS Production
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform ios --profile production --local --non-interactive --output=./app-ios-prod.ipa
        env:
          NODE_ENV: production
        working-directory: ./code

      - name: 🚀 Submit to Play Store
        run: |
          eas submit -p android --path ./app-prod.aab --non-interactive
#        env:
#          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
#          GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        working-directory: ./code

      - name: 🚀 Submit to App Store
        run: |
          eas submit -p ios --path ./app-ios-prod.ipa --non-interactive
#        env:
#          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
#          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
#          EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
#          EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}
        working-directory: ./code

      - name: 📦 Upload build artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-builds
          path: |
            ./app-prod.aab
            ./app-ios-prod.ipa
          retention-days: 60

      - name: 📢 Notify build completion
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
#          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: 'Build Results for ${{ github.repository }}'
          SLACK_MESSAGE: ${{ job.status == 'success' && 'Build completed successfully ✅' || 'Build failed ❌' }}
